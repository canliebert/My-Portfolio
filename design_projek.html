<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Graphic Designer Portfolio</title>
<link rel="icon" type="image/png" href="img/logo.png">

<style>
    :root{
        --bg:#0f1117;
        --card:rgba(255,255,255,.08);
        --border:rgba(255,255,255,.15);
        --text:#fff;
        --muted:#b8c0cc;
        --accent:#6ea8fe;
    }
    
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
    }
    
    body{
        font-family:Arial,sans-serif;
        background:var(--bg);
        color:var(--text);
        overflow-x:hidden;
    }
    
    /* =========================
       HERO
    ========================= */
    
    .hero{
        height:100vh;
        display:flex;
        flex-direction:column;
        justify-content:center;
        align-items:center;
        text-align:center;
        padding:20px;
        transition:.8s cubic-bezier(.25,1,.5,1);
    }
    
    .hero h1{
        font-size:4rem;
    }
    
    .hero p{
        color:var(--muted);
        margin:15px 0 30px;
    }
    
    /* =========================
       MENU
    ========================= */
    
    .menu-wrapper{
        width:100%;
        display:flex;
        justify-content:center;
    }
    
    .menu{
        display:flex;
        gap:15px;
        flex-wrap:wrap;
        justify-content:center;
    }
    
    .menu button{
        padding:12px 20px;
        border:none;
        border-radius:12px;
        background:var(--card);
        color:#fff;
        cursor:pointer;
        backdrop-filter:blur(12px);
        transition:.3s;
    }
    
    .menu button:hover{
        transform:translateY(-2px);
        background:rgba(255,255,255,.15);
    }
    
    .active{
        background:var(--accent)!important;
        color:#000!important;
        font-weight:bold;
    }
    
    /* =========================
       HAMBURGER
    ========================= */
    
    .hamburger{
        display:none;
        flex-direction:column;
        gap:6px;
        background:none;
        border:none;
        cursor:pointer;
        padding:10px;
        z-index:1001;
    }
    
    .hamburger span{
        width:28px;
        height:3px;
        background:#fff;
        border-radius:2px;
        transition:.3s;
    }
    
    /* =========================
       WORKSPACE MODE
    ========================= */
    
    .workspace .hero{
        height:auto;
        min-height:180px;
        max-width:1200px;
        width:100%;
        margin:auto;
        padding-top:50px;
        padding-bottom:20px;
        align-items:flex-start;
        text-align:left;
    }
    
    .workspace .hero h1{
        font-size:2.2rem;
    }
    
    .workspace .hero p{
        opacity:0;
        height:0;
        overflow:hidden;
        margin:0;
    }
    
    .workspace .menu-wrapper{
        justify-content:flex-start;
        margin-top:20px;
    }
    
    /* =========================
       GALLERY
    ========================= */
    
    .gallery-container{
        display:none;
        max-width:1200px;
        margin:auto;
        padding:20px;
        opacity:0;
        transform:translateY(30px);
    }
    
    .workspace .gallery-container{
        display:block;
        animation:fadeInUp .8s .4s forwards;
    }
    
    .grid{
        display:grid;
        grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
        gap:25px;
    }
    
    .card{
    background:var(--card);
    border:1px solid var(--border);
    border-radius:18px;
    overflow:hidden;
    position:relative;
    backdrop-filter:blur(10px);
    cursor:pointer;
    transition:.3s;
}

.card.poster{
    aspect-ratio:2/3;
}

.card.presentation{
    aspect-ratio:16/9;
}

.card.logos{
    aspect-ratio:1/1;
}

.card.social{
    aspect-ratio:4/3;
}

.card img{
    width:100%;
    height:100%;
    object-fit:cover;
    display:block;
    transition:.6s;
}

.card:hover{
    transform:translateY(-5px);
}

.card:hover img{
    transform:scale(1.08);
}
    
    .overlay{
        position:absolute;
        inset:0;
    
        background:linear-gradient(
            to top,
            rgba(0,0,0,.9),
            rgba(0,0,0,.3),
            transparent
        );
    
        opacity:0;
        transition:.4s;
    
        display:flex;
        flex-direction:column;
        justify-content:flex-end;
        padding:20px;
    }
    
    .card:hover .overlay{
        opacity:1;
    }
    
    .overlay h3{
        font-size:1rem;
        margin-bottom:5px;
    }
    
    .tag{
        color:#ddd;
        font-size:.8rem;
    }
    
    /* =========================
       ANIMATION
    ========================= */
    
    @keyframes fadeInUp{
        from{
            opacity:0;
            transform:translateY(40px);
        }
        to{
            opacity:1;
            transform:translateY(0);
        }
    }
    
    .reveal{
        opacity:0;
        transform:translateY(30px);
        transition:.8s;
    }
    
    .reveal.show{
        opacity:1;
        transform:none;
    }
    
    /* =========================
       TABLET
    ========================= */
    
    @media(max-width:768px){
    
    .hero h1{
        font-size:2.8rem;
    }
    
    .grid{
        grid-template-columns:repeat(2,1fr);
        gap:15px;
    }
    
    }
    
    /* =========================
       MOBILE
    ========================= */
    
    @media(max-width:600px){
    
    .hero h1{
        font-size:2.2rem;
    }
    
    .workspace .hero{
        align-items:center;
        text-align:center;
        min-height:120px;
    }
    
    .grid{
        grid-template-columns:repeat(3,1fr);
        gap:8px;
    }
    
    .gallery-container{
        padding:10px;
    }
    
    .card{
        border-radius:10px;
    }
    
    .overlay{
        padding:8px;
    }
    
    .overlay h3{
        font-size:.65rem;
    }
    
    .tag{
        font-size:.5rem;
    }
    
    /* Hamburger */
    
    .hamburger{
        display:flex;
        position:fixed;
        top:20px;
        right:20px;
    }
    
    .menu{
        position:fixed;
        inset:0;
        background:rgba(15,17,23,.98);
        backdrop-filter:blur(20px);
    
        flex-direction:column;
        justify-content:center;
        align-items:center;
        gap:25px;
    
        opacity:0;
        pointer-events:none;
        z-index:1000;
    
        transition:.4s;
    }
    
    .menu.mobile-open{
        opacity:1;
        pointer-events:auto;
    }
    
    .menu button{
        width:80%;
        max-width:300px;
        font-size:1.2rem;
        padding:15px;
    
        opacity:0;
        transform:translateY(20px);
    }
    
    .menu.mobile-open button{
        opacity:1;
        transform:translateY(0);
    }
    
    .menu.mobile-open button:nth-child(1){
        transition-delay:.1s;
    }
    
    .menu.mobile-open button:nth-child(2){
        transition-delay:.2s;
    }
    
    .menu.mobile-open button:nth-child(3){
        transition-delay:.3s;
    }
    
    .menu.mobile-open button:nth-child(4){
        transition-delay:.4s;
    }
    
    /* Hamburger Animation */
    
    .hamburger.toggle span:nth-child(1){
        transform:rotate(45deg) translate(6px,6px);
    }
    
    .hamburger.toggle span:nth-child(2){
        opacity:0;
    }
    
    .hamburger.toggle span:nth-child(3){
        transform:rotate(-45deg) translate(6px,-7px);
    }
    
    .workspace .menu-wrapper{
        justify-content:center;
    }
    
    .workspace .menu{
        position:fixed;
    }
    
    }
    </style>
</head>
<body>

<button class="hamburger" id="hamburgerBtn">
<span></span>
<span></span>
<span></span>
</button>

<section class="hero">
<h1>Graphic Designer Portfolio</h1>
<p>Poster, Presentations, Logos & Social Media Designs</p>

<div class="menu-wrapper">
<div class="menu" id="menu">
<button data-cat="poster">Poster</button>
<button data-cat="presentation">Presentation Design</button>
<button data-cat="logos">Logo Design</button>
<button data-cat="social">Social Media Content</button>
</div>
</div>
</section>

<div class="gallery-container">
<div class="grid" id="gallery"></div>
</div>

<script>
    const portfolioData = {
    
        poster: [
            {
                title: "Poster Festival Musik",
                category: "Poster",
                image: "img/projek_desain/poster/music.png"
            },
            {
                title: "Poster Webinar",
                category: "Poster",
                image: "img/projek_desain/poster/webinar.png"
            },
            {
                title: "Poster Coffee",
                category: "Poster",
                image: "img/projek_desain/poster/coffe.png"
            },
            {
                title: "Poster Gym",
                category: "Poster",
                image: "img/projek_desain/poster/gym.png"
            },
            {
                title: "Poster Charity",
                category: "Poster",
                image: "img/projek_desain/poster/charity.png"
            },
            {
                title: "Poster Inspira",
                category: "Poster",
                image: "img/projek_desain/poster/inspira.png"
            }
        ],
    
        presentation: [
            {
                title: "Company Profile",
                category: "Presentation",
                image: "img/projek_desain/slide/app.png"
            },
            {
                title: "Company Profile",
                category: "Presentation",
                image: "img/projek_desain/slide/real.png"
            }
        ],
    
        logos: [
            {
                title: "Logo",
                category: "Logo",
                image: "img/projek_desain/logo/1.png"
            },
            {
                title: "Logo",
                category: "Logo",
                image: "img/projek_desain/logo/2.png"
            }
        ],
    
        social: [
            {
                title: "Kopi Senja",
                category: "Social Media",
                image: "img/projek_desain/sosmed/kopi_senja.png"
            },
            {
                title: "Instagram Feed Technova",
                category: "Social Media",
                image: "img/projek_desain/sosmed/laptop.png"
            },
            {
                title: "Northly",
                category: "Social Media",
                image: "img/projek_desain/sosmed/northly.png"
            },
            {
                title: "Travelgo",
                category: "Social Media",
                image: "img/projek_desain/sosmed/travel.png"
            },
            {
                title: "Fashion HUB",
                category: "Social Media",
                image: "img/projek_desain/sosmed/fashion.png"
            }
        ]
    };
    
    const gallery = document.getElementById("gallery");
    const buttons = document.querySelectorAll(".menu button");
    const hamburgerBtn = document.getElementById("hamburgerBtn");
    const menu = document.getElementById("menu");
    
    function toggleMobileMenu() {
        hamburgerBtn.classList.toggle("toggle");
        menu.classList.toggle("mobile-open");
    }
    
    hamburgerBtn.addEventListener("click", toggleMobileMenu);
    
    function render(category){

gallery.innerHTML = "";

if(!portfolioData[category]){
    console.error("Kategori tidak ditemukan:", category);
    return;
}

portfolioData[category].forEach(item=>{

    gallery.innerHTML += `
    <div class="card reveal ${category}">
        <img src="${item.image}" alt="${item.title}">

        <div class="overlay">
            <h3>${item.title}</h3>
            <div class="tag">${item.category}</div>
        </div>
    </div>
    `;

});

observerRefresh();
}
    
    buttons.forEach(button => {
    
        button.addEventListener("click", () => {
    
            document.body.classList.add("workspace");
    
            buttons.forEach(btn => {
                btn.classList.remove("active");
            });
    
            button.classList.add("active");
    
            render(button.dataset.cat);
    
            if (menu.classList.contains("mobile-open")) {
                setTimeout(() => {
                    toggleMobileMenu();
                }, 200);
            }
        });
    
    });
    
    const observer = new IntersectionObserver(entries => {
    
        entries.forEach(entry => {
    
            if (entry.isIntersecting) {
                entry.target.classList.add("show");
            }
    
        });
    
    }, {
        threshold: 0.1
    });
    
    function observerRefresh() {
    
        document.querySelectorAll(".reveal").forEach(el => {
            observer.observe(el);
        });
    
    }
    
    // Tampilkan poster pertama saat halaman dibuka
    render("poster");
    </script>

</body>
</html>
